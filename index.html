<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vaquinha Online</title>

<style>
* {
  box-sizing: border-box;
}

body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #f2f4f7;
}

header {
  background: white;
  padding: 20px;
  text-align: center;
}

header img {
  width: 140px;
}

.container {
  padding: 20px;
  max-width: 500px;
  margin: auto;
}

.card {
  background: white;
  padding: 20px;
  border-radius: 15px;
  box-shadow: 0 5px 15px rgba(0,0,0,0.08);
  margin-bottom: 20px;
}

h1 {
  font-size: 20px;
  margin-bottom: 10px;
}

.meta-box {
  font-size: 14px;
  margin-bottom: 10px;
}

.barra {
  width: 100%;
  background: #e0e0e0;
  height: 20px;
  border-radius: 10px;
  overflow: hidden;
  margin-bottom: 15px;
}

.progresso {
  height: 100%;
  width: 0%;
  background: linear-gradient(90deg, #4CAF50, #2e7d32);
  transition: width 0.4s ease;
}

input {
  width: 100%;
  padding: 12px;
  border-radius: 8px;
  border: 1px solid #ccc;
  margin-bottom: 10px;
}

button {
  width: 100%;
  padding: 14px;
  background: #2e7d32;
  color: white;
  border: none;
  border-radius: 8px;
  font-weight: bold;
  font-size: 16px;
  cursor: pointer;
}

.pix-box {
  background: #f8fff9;
  padding: 15px;
  border-radius: 10px;
  font-size: 14px;
  margin-top: 10px;
}

.video-container iframe {
  width: 100%;
  border-radius: 10px;
}

.galeria img {
  width: 100%;
  border-radius: 10px;
  margin-bottom: 10px;
}
</style>
</head>

<body>

<header>
  <!-- COLOQUE A IMAGEM DO LOGO AQUI -->
  <img src="logo.png" alt="Logo Vaquinha">
</header>

<div class="container">

  <!-- CARD VAQUINHA -->
  <div class="card">
    <h1>Ajude Nossa Causa</h1>

    <div class="meta-box">
      <strong>Meta:</strong> R$ 10.000<br>
      <strong>Arrecadado:</strong> R$ <span id="arrecadado">0.00</span>
    </div>

    <div class="barra">
      <div class="progresso" id="progresso"></div>
    </div>

    <input type="number" id="valor" placeholder="Digite o valor da doação">

    <button onclick="mostrarPix()">DOAR VIA PIX</button>

    <div class="pix-box" id="pixBox" style="display:none;">
      <strong>Chave Pix:</strong><br>
      email@exemplo.com<br><br>
      Após o pagamento, envie o comprovante para confirmação.
    </div>
  </div>

  <!-- CARD VIDEO -->
  <div class="card">
    <h1>Vídeo da Campanha</h1>
    <div class="video-container">
      <!-- SUBSTITUA O LINK DO YOUTUBE AQUI -->
      <iframe height="220"
        src="https://www.youtube.com/embed/VIDEO_ID"
        frameborder="0"
        allowfullscreen>
      </iframe>
    </div>
  </div>

  <!-- CARD GALERIA -->
  <div class="card">
    <h1>Imagens da Causa</h1>
    <div class="galeria">
      <!-- ADICIONE SUAS IMAGENS AQUI -->
      <img src="imagem1.jpg">
      <img src="imagem2.jpg">
    </div>
  </div>

</div>

<script>
let meta = 10000;
let arrecadado = 0;

function mostrarPix() {
  let valor = parseFloat(document.getElementById("valor").value);
  if (valor > 0) {
    document.getElementById("pixBox").style.display = "block";
    arrecadado += valor;
    let porcentagem = (arrecadado / meta) * 100;
    document.getElementById("progresso").style.width = porcentagem + "%";
    document.getElementById("arrecadado").innerText = arrecadado.toFixed(2);
  } else {
    alert("Digite um valor válido.");
  }
}
</script>

</body>
</html>
